version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline --include=dev --legacy-peer-deps
    build:
      commands:
        - env | grep -e WIDGET_JWT_SECRET >> .env.production || true
        - env | grep -e WIDGET_ENCRYPT_SECRET >> .env.production || true
        - env | grep -e WIDGET_API_KEY >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*