version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline --include=dev --legacy-peer-deps
    build:
      commands:
        - env | grep -e WIDGET_JWT_SECRET >> .env.production || true
        - env | grep -e WIDGET_ENCRYPT_SECRET >> .env.production || true
        - env | grep -e WIDGET_API_KEY >> .env.production || true
        - env | grep -e WIDGET_USER_ID >> .env.production || true
        - env | grep -e RECAPTCHA_SECRET_KEY >> .env.production || true
        - env | grep -e NEXT_PUBLIC_GA_MEASUREMENT_ID >> .env.production || true
        - env | grep -e NEXT_PUBLIC_RECAPTCHA_SITE_KEY >> .env.production || true
        - env | grep -e NEXT_PUBLIC_SUPPORT_URL >> .env.production || true
        - env | grep -e NEXT_PUBLIC_SITE_URL >> .env.production || true
        - env | grep -e NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID >> .env.production || true
        - env | grep -e NEXT_PUBLIC_GTM_ID >> .env.production || true
        - env | grep -e WIDGET_API_BASE_URL >> .env.production || true
        - env | grep -e REGION >> .env.production || true
        - env | grep -e SES_FROM_ADDRESS >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*